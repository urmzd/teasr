[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[font]
family = "MonaspiceNe Nerd Font"

# ── Web: screenshot this project's GitHub page ──
[[scenes]]
type = "web"
url = "https://github.com/urmzd/teasr"
name = "github"
formats = [{ output_type = "gif" }, { output_type = "png" }]
frame_duration = 600

[[scenes.interactions]]
type = "wait"
duration = 3000
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "scroll-to"
selector = "article"
[[scenes.interactions]]
type = "wait"
duration = 600
[[scenes.interactions]]
type = "snapshot"

# ── Terminal: teasr --help with custom font ──
[[scenes]]
type = "terminal"
name = "cli-help"
theme = "dracula"
cols = 90
formats = [{ output_type = "gif" }, { output_type = "png" }]
frame_duration = 80

[[scenes.interactions]]
type = "type"
text = "teasr --help"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000

# ── Screen: Finder window showing the project directory ──
[[scenes]]
type = "screen"
name = "finder"
window = "Finder"
setup = "open ."
delay = 2000
formats = [{ output_type = "png" }]

[[scenes.interactions]]
type = "snapshot"
