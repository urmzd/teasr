[server]
command = "npx serve examples/demo --listen 3123"
url = "http://localhost:3123"
timeout = 10000

[output]
dir = "./showcase"
formats = ["png"]

# ── Web: interactive demo page ──
[[scenes]]
type = "web"
url = "/"
name = "demo-landing"
formats = ["gif", "png"]
frame_duration = 600
full_page = false

[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "click"
selector = "#cta-btn"
[[scenes.interactions]]
type = "wait"
duration = 800
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "click"
selector = "#tab-terminal"
[[scenes.interactions]]
type = "wait"
duration = 500
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "click"
selector = "#tab-screen"
[[scenes.interactions]]
type = "wait"
duration = 500
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "scroll-to"
selector = "#features"
[[scenes.interactions]]
type = "wait"
duration = 600
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "hover"
selector = "#feature-binary"
[[scenes.interactions]]
type = "wait"
duration = 400
[[scenes.interactions]]
type = "snapshot"

# ── Terminal: build teasr itself ──
[[scenes]]
type = "terminal"
name = "cli-help"
theme = "dracula"
cols = 90
rows = 24
formats = ["gif", "png"]
frame_duration = 80

[[scenes.interactions]]
type = "type"
text = "teasr --help"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 2000

# ── Screen: launch a fresh terminal session and capture it ──
[[scenes]]
type = "screen"
name = "desktop"
setup = "if [ \"$(uname)\" = 'Darwin' ]; then open -na Ghostty.app --args -e \"$PWD/examples/screen-demo.sh\"; else xterm -geometry 90x24 -e \"$PWD/examples/screen-demo.sh\" & sleep 1; fi"
delay = 3000
formats = ["gif", "png"]
frame_duration = 500

[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "wait"
duration = 1000
[[scenes.interactions]]
type = "snapshot"
[[scenes.interactions]]
type = "wait"
duration = 1000
[[scenes.interactions]]
type = "snapshot"
