name: "tease"
description: "Capture project showcase assets — screenshots, GIFs, and videos from web apps, desktop, and terminal"
author: "urmzd"

branding:
  icon: "camera"
  color: "purple"

inputs:
  config:
    description: "Path to config file"
    required: false
  formats:
    description: "Output formats (comma-separated: png,gif,mp4)"
    required: false
  output:
    description: "Output directory"
    required: false
    default: "./tease-output"
  ollama-model:
    description: "Ollama vision model (omit to skip AI)"
    required: false
  node-version:
    description: "Node.js version"
    required: false
    default: "20"

outputs:
  output-dir:
    description: "Path to the directory containing captured assets"
    value: ${{ inputs.output }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install Playwright browsers
      shell: bash
      run: npx playwright install --with-deps chromium

    - name: Install Ollama
      if: inputs.ollama-model != ''
      shell: bash
      env:
        OLLAMA_MODEL: ${{ inputs.ollama-model }}
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull "$OLLAMA_MODEL"

    - name: Run tease
      shell: bash
      env:
        TEASE_CONFIG: ${{ inputs.config }}
        TEASE_FORMATS: ${{ inputs.formats }}
        TEASE_OUTPUT: ${{ inputs.output }}
      run: |
        ARGS=""
        if [ -n "$TEASE_CONFIG" ]; then
          ARGS="$ARGS --config $TEASE_CONFIG"
        fi
        if [ -n "$TEASE_FORMATS" ]; then
          ARGS="$ARGS --formats $TEASE_FORMATS"
        fi
        if [ -n "$TEASE_OUTPUT" ]; then
          ARGS="$ARGS --output $TEASE_OUTPUT"
        fi
        npx @urmzd/tease $ARGS

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tease-output
        path: ${{ inputs.output }}
