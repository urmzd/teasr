name: "teasr"
description: "Capture project showcase assets — screenshots, GIFs, and videos from web apps, desktop, and terminal"
author: "urmzd"

branding:
  icon: "camera"
  color: "purple"

inputs:
  config:
    description: "Path to teasr.toml config file"
    required: false
  formats:
    description: "Output formats (comma-separated: png,gif,mp4)"
    required: false
  output:
    description: "Output directory"
    required: false
    default: "./teasr-output"
  version:
    description: "Teasr version to download (default: latest)"
    required: false
    default: "latest"

outputs:
  output-dir:
    description: "Path to the directory containing captured assets"
    value: ${{ inputs.output }}

runs:
  using: "composite"
  steps:
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        case "$RUNNER_OS-$RUNNER_ARCH" in
          Linux-X64)   echo "target=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          Linux-ARM64) echo "target=aarch64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          macOS-X64)   echo "target=x86_64-apple-darwin" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          macOS-ARM64) echo "target=aarch64-apple-darwin" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          Windows-X64) echo "target=x86_64-pc-windows-msvc" >> "$GITHUB_OUTPUT" ; echo "ext=zip" >> "$GITHUB_OUTPUT" ;;
          *)           echo "::error::Unsupported platform: $RUNNER_OS-$RUNNER_ARCH" ; exit 1 ;;
        esac

    - name: Download teasr binary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ inputs.version }}
        TARGET: ${{ steps.platform.outputs.target }}
        EXT: ${{ steps.platform.outputs.ext }}
      run: |
        REPO="${{ github.repository }}"
        if [ "$VERSION" = "latest" ]; then
          TAG=$(gh api "repos/$REPO/releases/latest" --jq .tag_name)
        else
          TAG="v$VERSION"
        fi
        ASSET="teasr-${TARGET}.${EXT}"
        gh release download "$TAG" --repo "$REPO" --pattern "$ASSET"
        if [ "$EXT" = "tar.gz" ]; then
          tar xzf "$ASSET"
          chmod +x teasr
          sudo mv teasr /usr/local/bin/
        else
          7z x "$ASSET"
          mv teasr.exe /usr/local/bin/
        fi

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Run teasr
      shell: bash
      env:
        TEASR_CONFIG: ${{ inputs.config }}
        TEASR_FORMATS: ${{ inputs.formats }}
        TEASR_OUTPUT: ${{ inputs.output }}
      run: |
        ARGS=""
        if [ -n "$TEASR_CONFIG" ]; then
          ARGS="$ARGS --config $TEASR_CONFIG"
        fi
        if [ -n "$TEASR_FORMATS" ]; then
          ARGS="$ARGS --formats $TEASR_FORMATS"
        fi
        if [ -n "$TEASR_OUTPUT" ]; then
          ARGS="$ARGS --output $TEASR_OUTPUT"
        fi
        teasr $ARGS

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: teasr-output
        path: ${{ inputs.output }}
