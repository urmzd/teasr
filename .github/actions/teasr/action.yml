name: "teasr"
description: "Install teasr and capture project showcase assets from teasr.toml"
author: "urmzd"

branding:
  icon: "camera"
  color: "purple"

inputs:
  version:
    description: "Teasr version to download (default: latest)"
    required: false
    default: "latest"
  scenes:
    description: "Comma-separated scene names or types to capture (default: all)"
    required: false
  args:
    description: "Additional arguments to pass to teasr showme"
    required: false

runs:
  using: "composite"
  steps:
    - name: Determine platform
      id: platform
      shell: bash
      run: |
        case "$RUNNER_OS-$RUNNER_ARCH" in
          Linux-X64)   echo "target=x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          Linux-ARM64) echo "target=aarch64-unknown-linux-gnu" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          macOS-X64)   echo "target=x86_64-apple-darwin" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          macOS-ARM64) echo "target=aarch64-apple-darwin" >> "$GITHUB_OUTPUT" ; echo "ext=tar.gz" >> "$GITHUB_OUTPUT" ;;
          Windows-X64) echo "target=x86_64-pc-windows-msvc" >> "$GITHUB_OUTPUT" ; echo "ext=zip" >> "$GITHUB_OUTPUT" ;;
          *)           echo "::error::Unsupported platform: $RUNNER_OS-$RUNNER_ARCH" ; exit 1 ;;
        esac

    - name: Download teasr binary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        VERSION: ${{ inputs.version }}
        TARGET: ${{ steps.platform.outputs.target }}
        EXT: ${{ steps.platform.outputs.ext }}
      run: |
        REPO="${{ github.repository }}"
        if [ "$VERSION" = "latest" ]; then
          TAG=$(gh api "repos/$REPO/releases/latest" --jq .tag_name)
        else
          TAG="v$VERSION"
        fi
        ASSET="teasr-${TARGET}.${EXT}"
        gh release download "$TAG" --repo "$REPO" --pattern "$ASSET"
        if [ "$EXT" = "tar.gz" ]; then
          tar xzf "$ASSET"
          chmod +x teasr
          sudo mv teasr /usr/local/bin/
        else
          7z x "$ASSET"
          mv teasr.exe /usr/local/bin/
        fi

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable

    - name: Install default font
      shell: bash
      run: teasr setup --fonts "Monaspace Nerd Font"

    - name: Run teasr
      shell: bash
      run: |
        ARGS="showme"
        if [ -n "${{ inputs.scenes }}" ]; then
          ARGS="$ARGS --scenes ${{ inputs.scenes }}"
        fi
        if [ -n "${{ inputs.args }}" ]; then
          ARGS="$ARGS ${{ inputs.args }}"
        fi
        teasr $ARGS
