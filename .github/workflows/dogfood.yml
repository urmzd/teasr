name: Dogfood

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build teasr
        run: cargo build --release -p teasr-cli

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run teasr on itself
        run: cargo run --release -p teasr-cli -- --verbose --timeout 60000

      - name: Upload showcase
        uses: actions/upload-artifact@v4
        with:
          name: showcase
          path: showcase/
          if-no-files-found: error
